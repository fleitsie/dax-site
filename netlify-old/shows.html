  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #C4BFB8;
      --text: #1a1a1a;
      --text-muted: #5a5550;
      --tab-active: #1a1a1a;
      --tab-inactive: #8a847d;
      --border: #a8a29c;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: var(--text);
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--tab-inactive);
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 40px 40px 24px;
    }
    .page-header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── YEAR TABS ── */
    .year-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      padding: 0 40px;
      border-bottom: 1px solid var(--border);
    }
    .year-tab {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tab-inactive);
      padding: 14px 20px 12px;
      position: relative;
      transition: color 0.15s;
    }
    .year-tab:hover {
      color: var(--text);
    }
    .year-tab.active {
      color: var(--text);
      font-weight: 500;
    }
    .year-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--text);
    }

    /* ── SHOWS GRID ── */
    .shows-section {
      padding: 40px 40px 80px;
    }
    .shows-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .show-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      line-height: 1.5;
      color: var(--text);
    }
    .show-date {
      color: var(--tab-inactive);
      display: inline;
      margin-right: 6px;
    }
    .show-info {
      display: inline;
    }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--tab-inactive);
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 900px) {
      .shows-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .site-nav, .page-header, .year-tabs, .shows-section, .site-footer { padding-left: 20px; padding-right: 20px; }
      .shows-grid { grid-template-columns: 1fr; }
      .year-tab { padding: 12px 12px 10px; font-size: 10px; }
    }
  </style>
</head>

const years = Object.keys(shows).sort((a, b) => b - a);

function renderTabs() {
  const container = document.getElementById('yearTabs');
  years.forEach((year, i) => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (i === 0 ? ' active' : '');
    btn.textContent = year;
    btn.dataset.year = year;
    btn.addEventListener('click', () => selectYear(year));
    container.appendChild(btn);
  });
}

function selectYear(year) {
  document.querySelectorAll('.year-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.year === year);
  });
  renderShows(year);
}

function renderShows(year) {
  const grid = document.getElementById('showsGrid');
  const list = shows[year] || [];

  grid.innerHTML = list.map(show => {
    const spaceIdx = show.indexOf(' ');
    const date = show.substring(0, spaceIdx);
    const rest = show.substring(spaceIdx + 1);
    return `<div class="show-item"><span class="show-date">${date}</span><span class="show-info">${rest}</span></div>`;
  }).join('');
}

renderTabs();
renderShows(years[0]);
