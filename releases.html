<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAX J — Releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-font-smoothing: antialiased;
    }

    /* soft vignette at edges */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 28%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 50;
    }

    .label {
      position: fixed;
      bottom: 2.2rem; left: calc(240px + 2.8rem);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      z-index: 60;
    }

    #scene {
      position: relative;
      left: 240px;
      width: calc(100vw - 240px);
      height: 100vh;
      overflow: hidden;
    }

    /* each tile is absolutely positioned */
    .tile {
      position: absolute;
      width: 0; height: 0; /* set by JS */
      cursor: pointer;
    }

    /* inner receives 3D tilt */
    .tile-inner {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
      will-change: transform;
      transition: transform 0.06s linear, box-shadow 0.06s linear;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }

    /* subtle inner vignette on each image */
    .tile-inner::after {
      content: '';
      position: absolute; inset: 0;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.35);
      pointer-events: none;
      z-index: 3;
    }

    .tile-inner img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tile-gloss {
      position: absolute; inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.06s linear;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: rgba(0,0,0,0.92);
      border-right: 1px solid rgba(255,255,255,0.06);
      z-index: 80;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.6rem 1rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.12) transparent;
    }

    #sidebar h2 {
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 1.2rem;
    }

    .sb-release { margin-bottom: 1rem; }

    .sb-release-title {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      padding: 0.2rem 0;
      transition: color 0.15s;
    }

    .sb-release-title:hover { color: #3fe1b1; }

    .sb-track {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.15rem 0 0.15rem 0.4rem;
      cursor: pointer;
      transition: color 0.15s;
      color: rgba(255,255,255,0.4);
      font-size: 0.52rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sb-track:hover { color: rgba(255,255,255,0.8); }
    .sb-track.active { color: #3fe1b1; }

    .sb-play-icon {
      flex-shrink: 0;
      font-size: 0.5rem;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-family: 'IBM Plex Mono', monospace;
    }

    #modal-overlay.open {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #modal-overlay.visible { opacity: 1; }

    #modal-content {
      display: flex;
      gap: 4rem;
      max-width: 1100px;
      width: 90%;
      align-items: center;
    }

    #modal-info { flex: 1; min-width: 0; }

    #modal-art {
      width: 420px; height: 420px;
      flex-shrink: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }

    #modal-art img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #modal-title {
      font-size: 1.4rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #fff; margin-bottom: 0.4rem;
    }

    #modal-meta {
      font-size: 0.58rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-bottom: 0.3rem;
    }

    #modal-catalog {
      font-size: 0.52rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      margin-bottom: 1.6rem;
    }

    #modal-tracklist-label {
      font-size: 0.48rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
      margin-bottom: 0.5rem;
    }

    .modal-track {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.25rem 0; font-size: 0.58rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); cursor: pointer;
      transition: color 0.15s;
    }

    .modal-track:hover { color: #fff; }
    .modal-track.active { color: #3fe1b1; }
    .modal-track .mt-play { font-size: 0.48rem; }

    #modal-links { display: flex; gap: 0.8rem; margin-top: 1.6rem; }

    #modal-links a {
      font-size: 0.48rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      text-decoration: none; border: 1px solid rgba(255,255,255,0.2);
      padding: 0.4rem 1rem; transition: color 0.15s, border-color 0.15s;
    }

    #modal-links a:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

    #modal-close {
      position: fixed; bottom: 3rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.52rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
      background: none; border: 1px solid rgba(255,255,255,0.25);
      padding: 0.6rem 2.4rem; cursor: pointer; z-index: 210;
      transition: color 0.15s, border-color 0.15s;
    }

    #modal-close:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

    /* ── Player Bar ── */
    #player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 48px; background: rgba(0,0,0,0.95);
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 100; display: none;
      align-items: center; padding: 0 1.6rem; gap: 1rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    #player-bar.active { display: flex; }

    #pb-play {
      background: none; border: none; color: #fff;
      font-size: 0.7rem; cursor: pointer; padding: 0.3rem; flex-shrink: 0;
    }

    #pb-name {
      font-size: 0.52rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 120px; max-width: 240px;
    }

    #pb-progress-wrap {
      flex: 1; height: 3px; background: rgba(255,255,255,0.1);
      cursor: pointer; position: relative; border-radius: 1.5px;
    }

    #pb-progress {
      height: 100%; background: #3fe1b1; width: 0%;
      border-radius: 1.5px; pointer-events: none;
    }

    #pb-time {
      font-size: 0.48rem; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35); flex-shrink: 0;
      min-width: 90px; text-align: right;
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <h2>Releases</h2>
    <div id="sidebar-list"></div>
  </aside>

  <div id="modal-overlay">
    <div id="modal-content">
      <div id="modal-info">
        <div id="modal-title"></div>
        <div id="modal-meta"></div>
        <div id="modal-catalog"></div>
        <div id="modal-tracklist-label">Tracklist:</div>
        <div id="modal-tracklist"></div>
        <div id="modal-links"></div>
      </div>
      <div id="modal-art"><img id="modal-art-img" src="" alt=""></div>
    </div>
    <button id="modal-close">Close</button>
  </div>

  <div id="scene"></div>
  <p class="label">DAX J &nbsp;&mdash;&nbsp; Releases</p>

  <div id="player-bar">
    <button id="pb-play">&#9654;</button>
    <div id="pb-name"></div>
    <div id="pb-progress-wrap"><div id="pb-progress"></div></div>
    <div id="pb-time">0:00 / 0:00</div>
  </div>

  <script>
    const RELEASES = [
      {
        title: "LPV",
        label: "TBC",
        year: 2025,
        catalog: "TBC",
        art: "images from me to you/displaywindow/a2791266284_10.jpg",
        links: { bandcamp: "#", beatport: "#", spotify: "#" },
        tracks: [
          { side: "A1", title: "Quantum Leap", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/a1-quantum-leap.mp3" },
          { side: "A2", title: "Beyond The Veil", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/a2-beyond-the-veil.mp3" },
          { side: "B1", title: "Spatial Interference", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/b1-spatial-interference.mp3" },
          { side: "B2", title: "Broken Tape", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/b2-broken-tape.mp3" },
          { side: "C1", title: "Warp Drive Wander", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/c1-warp-drive-wander.mp3" },
          { side: "C2", title: "Black Sand Beach", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/c2-black-sand-beach.mp3" },
          { side: "D1", title: "97100", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/d1-97100.mp3" },
          { side: "D2", title: "Chillness", src: "https://pub-e1383eba60f34889b595e68af46326a0.r2.dev/d2-chillness.mp3" }
        ]
      },
      {
        title: "Soul Enforcer",
        label: "Monnom Black",
        year: 2022,
        catalog: "MNNOM045",
        art: "images from me to you/displaywindow/a3240486097_10.jpg",
        links: { bandcamp: "#", beatport: "#", spotify: "#" },
        tracks: [
          { side: "A1", title: "Soul Enforcer", src: "" },
          { side: "A2", title: "Corrupted Signal", src: "" },
          { side: "B1", title: "Binary Storm", src: "" }
        ]
      },
      {
        title: "Chaos Come To Conquer",
        label: "Monnom Black",
        year: 2021,
        catalog: "MNNOM038",
        art: "images from me to you/displaywindow/a3288770580_10.jpg",
        links: { bandcamp: "#", beatport: "#", spotify: "#" },
        tracks: [
          { side: "A1", title: "Chaos Come To Conquer", src: "" },
          { side: "A2", title: "Absolute Dominion", src: "" },
          { side: "B1", title: "Retribution", src: "" }
        ]
      }
    ];

    // Derive SRCS from RELEASES art paths + remaining images for grid variety
    const SRCS = RELEASES.map(function(r) { return encodeURI(r.art); }).concat([
      'images%20from%20me%20to%20you/displaywindow/a0073328866_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a0691030606_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1082716305_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1286263440_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1405643370_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1410557316_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1574826057_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a1790919903_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a2275957915_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a2412796709_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a2700681520_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a2701339670_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a3414222201_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a3456703649_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a3592528568_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a3612426603_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a4264431482_10.jpg',
      'images%20from%20me%20to%20you/displaywindow/a4279162120_10.jpg'
    ]);

    function releaseForSrc(src) {
      return RELEASES.find(function(r) { return encodeURI(r.art) === src; }) || null;
    }

    // ── Audio Player ──
    var audio = new Audio();
    var currentRelease = -1;
    var currentTrack = -1;
    var isPlaying = false;
    var modalOpen = false;
    var modalReleaseIndex = -1;

    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      var m = Math.floor(s / 60);
      var sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function highlightActive() {
      document.querySelectorAll('.sb-track').forEach(function(el) {
        var ri = parseInt(el.dataset.ri);
        var ti = parseInt(el.dataset.ti);
        el.classList.toggle('active', ri === currentRelease && ti === currentTrack);
      });
      if (modalOpen) {
        document.querySelectorAll('.modal-track').forEach(function(el, i) {
          el.classList.toggle('active', modalReleaseIndex === currentRelease && i === currentTrack);
        });
      }
    }

    function playTrack(ri, ti) {
      var rel = RELEASES[ri];
      var trk = rel.tracks[ti];
      if (!trk.src) {
        console.warn('No audio source for', rel.title, trk.title);
        return;
      }

      currentRelease = ri;
      currentTrack = ti;

      audio.src = trk.src;
      audio.play();
      isPlaying = true;

      document.getElementById('player-bar').classList.add('active');
      document.getElementById('pb-name').textContent = trk.side + '. ' + trk.title + '  \u2014  ' + rel.title;
      document.getElementById('pb-play').textContent = '\u25AE\u25AE';
      highlightActive();
    }

    function togglePlay() {
      if (!audio.src) return;
      if (audio.paused) {
        audio.play();
        isPlaying = true;
        document.getElementById('pb-play').textContent = '\u25AE\u25AE';
      } else {
        audio.pause();
        isPlaying = false;
        document.getElementById('pb-play').textContent = '\u25B6';
      }
    }

    // ── Modal ──
    function openModal(ri) {
      var rel = RELEASES[ri];
      if (!rel) return;
      modalReleaseIndex = ri;

      document.getElementById('modal-title').textContent = rel.title;
      document.getElementById('modal-meta').textContent = rel.label + ' / ' + rel.year;
      document.getElementById('modal-catalog').textContent = rel.catalog;
      document.getElementById('modal-art-img').src = encodeURI(rel.art);

      var tl = document.getElementById('modal-tracklist');
      tl.innerHTML = '';
      rel.tracks.forEach(function(trk, ti) {
        var row = document.createElement('div');
        row.className = 'modal-track';
        if (currentRelease === ri && currentTrack === ti) row.classList.add('active');

        var icon = document.createElement('span');
        icon.className = 'mt-play';
        icon.textContent = '\u25B6';

        var name = document.createElement('span');
        name.textContent = trk.side + '. ' + trk.title;

        row.appendChild(icon);
        row.appendChild(name);
        row.addEventListener('click', function() { playTrack(ri, ti); });
        tl.appendChild(row);
      });

      var linksEl = document.getElementById('modal-links');
      linksEl.innerHTML = '';
      Object.keys(rel.links).forEach(function(key) {
        if (rel.links[key] && rel.links[key] !== '#') {
          var a = document.createElement('a');
          a.href = rel.links[key];
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = key;
          linksEl.appendChild(a);
        }
      });

      var overlay = document.getElementById('modal-overlay');
      overlay.classList.add('open');
      overlay.offsetHeight; // trigger reflow
      overlay.classList.add('visible');
      modalOpen = true;
    }

    function closeModal() {
      var overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('visible');
      setTimeout(function() { overlay.classList.remove('open'); }, 300);
      modalOpen = false;
    }

    // ── Sidebar rendering ──
    function renderSidebar() {
      var list = document.getElementById('sidebar-list');
      list.innerHTML = '';
      RELEASES.forEach(function(rel, ri) {
        var div = document.createElement('div');
        div.className = 'sb-release';

        var title = document.createElement('div');
        title.className = 'sb-release-title';
        title.textContent = rel.title;
        title.addEventListener('click', function() { openModal(ri); });
        div.appendChild(title);

        rel.tracks.forEach(function(trk, ti) {
          var row = document.createElement('div');
          row.className = 'sb-track';
          row.dataset.ri = ri;
          row.dataset.ti = ti;

          var icon = document.createElement('span');
          icon.className = 'sb-play-icon';
          icon.textContent = '\u25B6';

          var name = document.createElement('span');
          name.textContent = trk.side + '. ' + trk.title;

          row.appendChild(icon);
          row.appendChild(name);
          row.addEventListener('click', function() { playTrack(ri, ti); });
          div.appendChild(row);
        });

        list.appendChild(div);
      });
    }

    // ── Layout constants ──
    const SZ     = 338;   // image size (px, square)
    const H_GAP  = 130;   // horizontal gap between images
    const V_GAP  = 120;   // vertical gap between rows
    const STEP_X = SZ + H_GAP;   // 390
    const STEP_Y = SZ + V_GAP;   // 380

    // Row stagger: alternate rows are offset by half a step
    // row mod 3: 0 → 0, 1 → STEP_X/2, 2 → STEP_X/4
    const STAGGER = [0, STEP_X * 0.5, STEP_X * 0.25];

    // Pool: enough tiles to cover viewport + 1 buffer on each side
    const SIDEBAR_W = 240;
    const VW = window.innerWidth - SIDEBAR_W;
    const VH = window.innerHeight;

    const POOL_COLS = Math.ceil(VW  / STEP_X) + 3;   // visible + 2 buffer cols
    const POOL_ROWS = Math.ceil(VH  / STEP_Y) + 3;   // visible + 2 buffer rows
    // Make POOL_ROWS a multiple of 3 so row stagger stays consistent after Y-wrap
    const PR = POOL_ROWS + ((3 - (POOL_ROWS % 3)) % 3);

    // We start tiles so the grid is centred, with a –1 buffer on each side
    // offsetX/Y: how far the logical origin has shifted from the viewport origin
    let offsetX = -(SZ + H_GAP) + (VW - (POOL_COLS - 2) * STEP_X) / 2;
    let offsetY = -(SZ + V_GAP) + (VH - (PR        - 2) * STEP_Y) / 2;

    // Correct: start at a scroll offset that centres the grid
    // We track a continuous scroll position:
    let scrollX = 0;
    let scrollY = 0;

    const scene = document.getElementById('scene');
    const tiles  = [];

    // ── Create tile pool ──
    for (let pr = 0; pr < PR; pr++) {
      for (let pc = 0; pc < POOL_COLS; pc++) {
        const el    = document.createElement('div');
        el.className = 'tile';
        el.style.width  = SZ + 'px';
        el.style.height = SZ + 'px';

        const inner = document.createElement('div');
        inner.className = 'tile-inner';

        const img   = document.createElement('img');
        img.alt = '';

        const gloss = document.createElement('div');
        gloss.className = 'tile-gloss';

        inner.appendChild(img);
        inner.appendChild(gloss);
        el.appendChild(inner);
        scene.appendChild(el);

        tiles.push({ el, inner, img, gloss, logC: pc - 1, logR: pr - 1, curSrc: '' });

        // Click vs drag detection
        (function(tile) {
          var downX, downY;
          tile.el.addEventListener('mousedown', function(e) {
            downX = e.clientX;
            downY = e.clientY;
          });
          tile.el.addEventListener('mouseup', function(e) {
            var dx = e.clientX - downX;
            var dy = e.clientY - downY;
            if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
              var rel = releaseForSrc(tile.curSrc);
              if (rel) openModal(RELEASES.indexOf(rel));
            }
          });
        })(tiles[tiles.length - 1]);
      }
    }

    // ── Helpers ──
    function posMod(n, m) { return ((n % m) + m) % m; }

    function imgFor(logC, logR) {
      // Distribute 21 images: use two coprime-ish multipliers
      return SRCS[posMod(logC * 5 + logR * 8, SRCS.length)];
    }

    function staggerFor(logR) {
      return STAGGER[posMod(logR, 3)];
    }

    // ── Layout update ──
    function layoutTiles() {
      for (const t of tiles) {
        const sg = staggerFor(t.logR);
        let x = t.logC * STEP_X + sg - scrollX + offsetX;
        let y = t.logR * STEP_Y      - scrollY + offsetY;

        // Horizontal wrap
        const periodX = POOL_COLS * STEP_X;
        if (x < -STEP_X * 1.6) {
          t.logC += POOL_COLS;
          x += periodX;
        } else if (x > VW + STEP_X * 0.6) {
          t.logC -= POOL_COLS;
          x -= periodX;
        }

        // Vertical wrap (PR is multiple of 3 so stagger stays consistent)
        const periodY = PR * STEP_Y;
        if (y < -STEP_Y * 1.6) {
          t.logR += PR;
          y += periodY;
        } else if (y > VH + STEP_Y * 0.6) {
          t.logR -= PR;
          y -= periodY;
        }

        t.el.style.transform = 'translate3d(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px,0)';

        // Swap image only when it changes (avoids flicker)
        const src = imgFor(t.logC, t.logR);
        if (t.curSrc !== src) {
          t.img.src = src;
          t.curSrc  = src;
        }
      }
    }

    // ── Scroll-driven pan ──
    // targetX/Y track the raw wheel input directly.
    // scrollX/Y chase the target each frame with a stiffness factor —
    // high value = tight/stiff, low = floaty. No separate velocity layer
    // so the OS trackpad momentum is the only inertia (no double-floating).
    let targetX = 0, targetY = 0;
    const STIFFNESS = 0.5;   // fraction of gap closed per frame — 0.3 = stiff, 0.1 = soft

    window.addEventListener('wheel', function(e) {
      e.preventDefault();
      targetX += e.deltaX;
      targetY += e.deltaY;
    }, { passive: false });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function rafLoop() {
      scrollX += (targetX - scrollX) * STIFFNESS;
      scrollY += (targetY - scrollY) * STIFFNESS;
      layoutTiles();
      requestAnimationFrame(rafLoop);
    }

    // ── Per-tile 3D hover tilt ──
    tiles.forEach(function(t) {
      let tRX = 0, tRY = 0, cRX = 0, cRY = 0, tTZ = 0, cTZ = 0;
      let hoverRaf = null;

      function tiltTick() {
        cRX = lerp(cRX, tRX, 0.15);
        cRY = lerp(cRY, tRY, 0.15);
        cTZ = lerp(cTZ, tTZ, 0.15);

        t.inner.style.transform =
          'perspective(640px)' +
          ' rotateX(' + cRX.toFixed(3) + 'deg)' +
          ' rotateY(' + cRY.toFixed(3) + 'deg)' +
          ' translateZ(' + cTZ.toFixed(2) + 'px)' +
          ' scale(1.03)';

        const sx = (-cRY / 20) * 24;
        const sy = ( cRX / 20) * 24;
        t.inner.style.boxShadow =
          sx + 'px ' + sy + 'px 36px rgba(0,0,0,0.9),' +
          '0 20px 55px rgba(0,0,0,0.65)';

        const done =
          Math.abs(cRX - tRX) < 0.02 &&
          Math.abs(cRY - tRY) < 0.02 &&
          Math.abs(cTZ - tTZ) < 0.1;
        hoverRaf = done ? null : requestAnimationFrame(tiltTick);
      }

      t.el.addEventListener('mouseenter', function() {
        tTZ = 14;
        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });

      t.el.addEventListener('mousemove', function(e) {
        const r = t.el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;

        tRX = -y * 20;
        tRY =  x * 20;

        // gloss follows cursor
        const gx = (50 + x * 88).toFixed(1);
        const gy = (50 + y * 88).toFixed(1);
        t.gloss.style.background =
          'radial-gradient(circle at ' + gx + '% ' + gy + '%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 45%, transparent 65%)';
        t.gloss.style.opacity = '1';

        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });

      t.el.addEventListener('mouseleave', function() {
        tRX = 0; tRY = 0; tTZ = 0;
        t.gloss.style.opacity = '0';
        t.inner.style.boxShadow = '0 8px 40px rgba(0,0,0,0.55)';
        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });
    });

    // ── Player bar controls ──
    document.getElementById('pb-play').addEventListener('click', togglePlay);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOpen) closeModal();
    });

    audio.addEventListener('timeupdate', function() {
      var pct = (audio.currentTime / audio.duration) * 100;
      document.getElementById('pb-progress').style.width = pct + '%';
      document.getElementById('pb-time').textContent =
        formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    });

    document.getElementById('pb-progress-wrap').addEventListener('click', function(e) {
      var rect = this.getBoundingClientRect();
      var pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    audio.addEventListener('ended', function() {
      var rel = RELEASES[currentRelease];
      if (currentTrack < rel.tracks.length - 1) {
        playTrack(currentRelease, currentTrack + 1);
      } else if (currentRelease < RELEASES.length - 1) {
        playTrack(currentRelease + 1, 0);
      } else {
        isPlaying = false;
        document.getElementById('pb-play').textContent = '\u25B6';
      }
    });

    // ── Start ──
    renderSidebar();
    layoutTiles();
    requestAnimationFrame(rafLoop);
  </script>

</body>
</html>
