<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAX J — Releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="player.css">
  <style>
    :root {
      --bg: #000;
      --bg-alpha95: rgba(0,0,0,0.95);
      --bg-alpha92: rgba(0,0,0,0.92);
      --text: #fff;
      --text-a85: rgba(255,255,255,0.85);
      --text-a70: rgba(255,255,255,0.7);
      --text-a55: rgba(255,255,255,0.55);
      --text-a50: rgba(255,255,255,0.5);
      --text-a45: rgba(255,255,255,0.45);
      --text-a40: rgba(255,255,255,0.4);
      --text-a35: rgba(255,255,255,0.35);
      --text-a25: rgba(255,255,255,0.25);
      --text-a20: rgba(255,255,255,0.2);
      --text-a15: rgba(255,255,255,0.15);
      --text-a12: rgba(255,255,255,0.12);
      --text-a10: rgba(255,255,255,0.1);
      --text-a08: rgba(255,255,255,0.08);
      --text-a06: rgba(255,255,255,0.06);
      --accent: #39ff14;
      --accent-a30: rgba(57,255,20,0.3);
      --shadow: rgba(0,0,0,0.55);
      --shadow-heavy: rgba(0,0,0,0.8);
      --vignette-inner: rgba(0,0,0,0.6);
    }

    html.light {
      --bg: #B5B0A7;
      --bg-alpha95: rgba(181,176,167,0.95);
      --bg-alpha92: rgba(181,176,167,0.92);
      --text: #1a1916;
      --text-a85: rgba(26,25,22,0.85);
      --text-a70: rgba(26,25,22,0.7);
      --text-a55: rgba(26,25,22,0.55);
      --text-a50: rgba(26,25,22,0.5);
      --text-a45: rgba(26,25,22,0.45);
      --text-a40: rgba(26,25,22,0.4);
      --text-a35: rgba(26,25,22,0.35);
      --text-a25: rgba(26,25,22,0.25);
      --text-a20: rgba(26,25,22,0.2);
      --text-a15: rgba(26,25,22,0.15);
      --text-a12: rgba(26,25,22,0.12);
      --text-a10: rgba(26,25,22,0.1);
      --text-a08: rgba(26,25,22,0.08);
      --text-a06: rgba(26,25,22,0.1);
      --accent: #39ff14;
      --accent-a30: rgba(57,255,20,0.3);
      --shadow: rgba(26,25,22,0.15);
      --shadow-heavy: rgba(26,25,22,0.25);
      --vignette-inner: none;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background 0.5s ease;
    }

    /* vignette — offset to account for sidebar, vignette offset for sidebar */
    body::after {
      content: '';
      position: fixed;
      top: 0; bottom: 0;
      left: 240px; right: 0;
      background: radial-gradient(circle at center, transparent 0%, transparent 41%, var(--bg) 100%);
      pointer-events: none;
      z-index: 50;
    }

    .label {
      position: fixed;
      bottom: 2.2rem; left: calc(240px + 2.8rem);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-a15);
      z-index: 60;
    }

    #scene {
      position: relative;
      left: 240px;
      width: calc(100vw - 240px);
      height: 100vh;
      overflow: hidden;
    }

    /* each tile is absolutely positioned */
    .tile {
      position: absolute;
      width: 0; height: 0; /* set by JS */
      cursor: pointer;
    }

    /* inner receives 3D tilt */
    .tile-inner {
      width: 100%; height: 100%;
      position: relative;
      overflow: hidden;
      will-change: transform;
      transition: transform 0.06s linear, box-shadow 0.06s linear;
      box-shadow: 0 8px 40px var(--shadow);
    }

    /* cinematic inner vignette on each image */
    .tile-inner::after {
      content: '';
      position: absolute; inset: 0;
      box-shadow: inset 0 0 70px var(--vignette-inner);
      pointer-events: none;
      z-index: 3;
    }

    .tile-inner img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: saturate(0.7) contrast(1.15) brightness(0.95);
    }

    .tile-gloss {
      position: absolute; inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.06s linear;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 26px;
      padding: 19px 32px;
      z-index: 300;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: var(--bg-alpha95);
      transition: background 0.5s ease;
    }
    nav a {
      color: var(--text-a50);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--text); }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 2.4rem; left: 0;
      width: 240px;
      height: calc(100vh - 2.4rem);
      background: var(--bg-alpha92);
      border-right: 1px solid var(--text-a06);
      z-index: 210;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.6rem 1rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      scrollbar-width: thin;
      scrollbar-color: var(--text-a12) transparent;
      transition: background 0.5s ease;
    }

    #sidebar h2 {
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-a25);
      margin-bottom: 0.8rem;
    }

    #sb-search-wrap { margin-bottom: 0.8rem; }
    #sb-search {
      width: 100%;
      background: var(--text-a06);
      border: 1px solid var(--text-a06);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.45rem 0.6rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #sb-search::placeholder { color: var(--text-a25); }
    #sb-search:focus { border-color: var(--accent); }

    .sb-release { margin-bottom: 1rem; }

    .sb-release-title {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-a85);
      cursor: pointer;
      padding: 0.2rem 0;
      transition: color 0.15s;
    }

    .sb-release-title:hover { color: var(--accent); }
    .sb-release-title:active { color: var(--accent); }

    .sb-track {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.15rem 0 0.15rem 0.4rem;
      cursor: pointer;
      transition: color 0.15s;
      color: var(--text-a40);
      font-size: 11.5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sb-track:hover { color: var(--text-a85); }
    .sb-track.active { color: var(--accent); }

    .sb-play-icon {
      flex-shrink: 0;
      font-size: 12px;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed; inset: 0;
      z-index: 150;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      font-family: 'IBM Plex Mono', monospace;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    #modal-overlay.open { display: block; }
    #modal-overlay.visible { opacity: 1; }

    /* Full-bleed art background */
    #modal-banner {
      position: fixed; inset: 0; z-index: 0;
    }
    #modal-banner img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
    }
    #modal-banner::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.65);
    }

    /* Scroll wrapper for content */
    #modal-scroll {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; justify-content: center;
      padding: 60px 20px;
    }

    /* Frosted glass panel */
    #modal-content {
      width: 100%; max-width: 700px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 48px 40px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1), transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    #modal-content.reveal { opacity: 1; transform: translateY(0); }

    /* Flying artwork clone */
    #flying-art {
      position: fixed; z-index: 160;
      pointer-events: none;
      will-change: transform, top, left, width, height;
      overflow: hidden;
    }
    #flying-art img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Two-column grid */
    #modal-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    #modal-title {
      font-size: 20px; font-weight: 500;
      letter-spacing: 0.04em; text-transform: uppercase;
      line-height: 1.3; color: #fff; margin-bottom: 6px;
    }

    #modal-artist {
      font-size: 13px; font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 24px;
    }

    #modal-meta {
      display: flex; flex-wrap: wrap; gap: 14px;
      font-size: 11px; font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 20px;
    }

    #modal-desc {
      font-size: 12px; font-weight: 300;
      line-height: 1.75; color: rgba(255,255,255,0.65);
      margin-bottom: 28px;
      white-space: pre-line;
    }

    #modal-links { display: flex; gap: 10px; }
    #modal-links a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); text-decoration: none;
      padding: 9px 16px; border: 1px solid var(--accent);
      transition: background 0.2s, color 0.2s;
    }
    #modal-links a:hover { background: var(--accent); color: #000; }

    #modal-tracklist-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 16px;
    }

    #modal-tracklist { list-style: none; }

    .modal-track {
      display: flex; align-items: baseline; gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: color 0.2s; color: #fff;
    }
    .modal-track:first-child { border-top: 1px solid rgba(255,255,255,0.05); }
    .modal-track:hover { color: var(--accent); }
    .modal-track.active { color: var(--accent); }
    .modal-track .mt-num {
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.35); min-width: 24px;
      transition: opacity 0.2s;
    }
    .modal-track:hover .mt-num { color: var(--accent); }
    .modal-track .mt-play { display: none; }
    .modal-track .mt-title {
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.02em;
    }

    #modal-close-row {
      margin-top: 40px; padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    #modal-close {
      display: block; width: 100%;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 14px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #modal-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    #modal-close-x {
      position: fixed; top: 60px; right: 24px; z-index: 155;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-family: 'IBM Plex Mono', monospace;
      font-size: 18px; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
      opacity: 0;
    }
    #modal-close-x.reveal { opacity: 1; }
    #modal-close-x:hover { border-color: var(--accent); color: var(--accent); }

/* Phase 1: Tiles lift up slightly (the "breathe in") */
    .tile.lifting {
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1) !important;
    }
    /* Phase 2: Tiles scatter outward with organic movement */
    .tile.scattering {
      transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1) !important;
      opacity: 0 !important;
    }
    /* The clicked tile stays visible during scatter */
    .tile.scatter-origin {
      opacity: 1 !important;
      z-index: 10;
    }
    .label.fading { transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0 !important; }
    #sidebar.fading { transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0; }
    #sidebar.dimmed { transition: opacity 0.4s ease; }

    /* Phase reverse: Tiles pop back into grid */
    .tile.gathering {
      transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s cubic-bezier(0.19, 1, 0.22, 1) !important;
      opacity: 1 !important;
    }

    /* Tiles return when modal closing */
    .label.returning { transition: opacity 0.4s cubic-bezier(0.19, 1, 0.22, 1) 0.15s; }
    #sidebar.returning { transition: opacity 0.4s cubic-bezier(0.19, 1, 0.22, 1) 0.15s; }

    /* Theme toggle */
    .theme-toggle {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
    }
    .theme-toggle-label {
      font-size: 0.48rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-a35);
      transition: color 0.15s;
    }
    .theme-toggle:hover .theme-toggle-label { color: var(--text-a70); }
    .theme-toggle-track {
      width: 32px; height: 16px;
      background: var(--text-a10);
      border-radius: 8px;
      position: relative;
      transition: background 0.3s ease;
    }
    .theme-toggle-thumb {
      width: 12px; height: 12px;
      background: var(--text-a50);
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.3s ease, background 0.3s ease;
    }
    html.light .theme-toggle-thumb { left: 18px; }
    html.light .theme-toggle-track { background: var(--text-a25); }

    /* Sound toggle */
    .sound-toggle {
      display: flex; align-items: center;
      cursor: pointer;
      color: var(--text-a35);
      transition: color 0.2s;
      margin-left: 12px;
    }
    .sound-toggle:hover { color: var(--text-a70); }
    .sound-toggle svg { width: 14px; height: 14px; }
    .sound-toggle .sound-dot { transition: opacity 0.3s; }
    .sound-toggle.off { color: var(--text-a15); }
    .sound-toggle.off .sound-dot { opacity: 0; }

    /* Light mode: warm scene */
    html.light #scene { background: var(--bg); }
    html.light body::after {
      background: radial-gradient(ellipse at center, transparent 50%, rgba(181,176,167,0.6) 100%);
    }
    html.light .tile-inner {
      border-radius: 3px;
      box-shadow: 0 6px 24px rgba(26,25,22,0.15);
    }
    html.light .tile-inner:hover {
      box-shadow: 0 12px 36px rgba(26,25,22,0.25);
    }
    html.light .tile-inner::after {
      box-shadow: none;
    }
    html.light .tile-inner img {
      filter: saturate(0.85) contrast(1.05) brightness(1);
    }
    html.light #sidebar {
      background: rgba(181,176,167,0.5);
      border-right: 1px solid rgba(26,25,22,0.06);
      scrollbar-color: rgba(26,25,22,0.15) transparent;
    }
    @media (max-width: 800px) {
      nav { font-size: 13px; padding: 14px 20px; gap: 18px; }
      #sidebar { display: none; }
      #scene { left: 0; width: 100vw; }
    }
  </style>
</head>

      {
        title: "Offending Public Morality LP",
        artist: "Dax J",
        desc: "Dax J’s success within the challenging environment of international DJing and music production has been considerable, yet he hasn’t chosen to passively bask in the comfort of his accomplishments. Instead, he has used his recent experiences to create sonic weapons to confront “public morality” with a themed album of the same name. The concept of “public morality” is one that can be used to help solidify the bonds that hold together society, but on the other hand, it can also provide the basis for acts of exclusion and scapegoating within that same society.\n\n\n\nTouching upon numerous “hot button” issues that could offend non-reflective, puritanical sensibilities (i.e. drug abuse, racism, prostitution, murder), Offending Public Morality sprawls out like a foreboding urban landscape and calls upon all kinds of sound elements that will be new to those already familiar with Dax J. Though he has been closely identified with the techno genre this new set makes knowing nods towards his influences in the UK jungle / drum ‘n bass scene, while also undertaking exercises in IDM, EBM, acid and other forms of uncategorizable intensity. From the introductory “Babylon Brutality”, which nails gritty film samples to a lush vocal elegy and authoritarian percussion, Dax J presents a story wherein creative, exploratory energy is constantly forced to contend with paranoiac, racist and exploitative tendencies. It’s a relentless record typified by dark undertones and raw, unfiltered energy.\n\n\n\nEqual portions of positive excitement and dread are present in the sequencer-powered, dialed-in rush of “Reclaim Our Lost Honor” or “Offending Public Morality” (whose Middle Eastern-flavored keys separate it from many likeminded journeys into Euro-coldness), while acid-dripping cuts like “Unrepentacostal” and the jungle cyborg stomp “Mustapha Mond” take a darker, chillier approach. There are plenty of seductive moments to keep the force of impact from being too overwhelming – especially Zanias’ guest vocal turn on “Waves of Isolation,” and the flaring brightness of “Feed The Pigeons” – but these moments of beauty tend to only highlight the importance of Dax J’s overall message.\n\n\n\nThat this message can be conveyed clearly with such a variety of different sound techniques is a real testament to Dax J’s skill as a producer, but also to his perceptiveness and his resilience in the face of adversity.\n\n\n\nOffending Public Morality draws up the lines of conflict in a way that’s vivid and loud as possible; using radical sounds to document the ongoing struggle between free expression and violent repression.",

      {
        title: "Body Music LP",
        artist: "Thomas P. Heckmann",
        desc: "Monnom Black is proud to present BODY MUSIC - the new album from legendary electronic Thomas P. Heckmann is a man who needs little introduction. The German producer has flexed his prowess across all shades of electronic music, but it’s his contributions to EBM-Techno, Acid, Industrial and Experimental that has earned him his notoriety, and it was in 1994 when he dropped an acid-tinged ‘Amphetamine’ as DRAX LTD. II that shot him into being recognised as a power to be reckoned with. For the production of BODY MUSIC, Heckmann has utilised 30 years worth of acquired knowledge to create a hard-hitting album which bears all the grit Heckmann is renowned for. Harmonising analogue and digital wares to create an utterly immersive album over the course of 14 tracks. Tracks such as Provide the Future, Bloody Vacant and Zeitmaschine are prime examples of how TPH can bring forth his charismatic productions into the contemporary techno climate, whilst sealing each track with his signature stamp. His vast knowledge of modular and analogue syntheses teamed with his ability to build tension proves optimal in BODY MUSIC’s storytelling. The album’s mission statement is simple: “Connecting the future with the past.” Tracks such as EBM3 start off where Thomas left off back in the early 2000s - sequels to EBM1 and EBM2. The LP will be presented over three slabs of vinyl, with the album covering significant ground in techno, EBM, acid and electro (and many chasms in between). BODY MUSIC is a prime example of why TPH has remained so in demand and relevant over the years - and now more than ever. Includes unlimited streaming of Body Music LP via the free Bandcamp app, plus high-quality download in MP3, FLAC and more.",

            a.rel = 'noopener';
            a.textContent = key;
            a.addEventListener('mouseenter', playPop);
            linksEl.appendChild(a);
          }
        });

        document.getElementById('modal-overlay').scrollTop = 0;

        // Phase 3: New art fades in with scale settle
        requestAnimationFrame(function() {
          bannerImg.style.transition = 'opacity 0.5s ease, transform 0.7s cubic-bezier(0.19, 1, 0.22, 1)';
          bannerImg.style.opacity = '1';
          bannerImg.style.transform = 'scale(1)';

          // Phase 4: Panel rises from below with spring
          setTimeout(function() {
            contentEl.style.transition = 'opacity 0.6s cubic-bezier(0.19, 1, 0.22, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1)';
            contentEl.style.transform = '';
            contentEl.classList.add('reveal');
            closeX.classList.add('reveal');

            // Clean up inline styles after animation so close/open still works
            setTimeout(function() {
              contentEl.style.transition = '';
              bannerImg.style.transition = '';
              switchBusy = false;
            }, 700);
          }, 250);
        });
      }, 450);
    }

    // ── Scroll-to-release from sidebar ──
    var pendingOpenRI = -1;
    var pendingOpenCheck = null;

    function scrollToRelease(ri) {
      var targetSrc = encodeURI(RELEASES[ri].art);
      var N = SRCS.length;

      // Current center in logical coordinates
      var centerLogC = Math.round(scrollX / STEP_X);
      var centerLogR = Math.round(scrollY / STEP_Y);

      // Search nearby grid positions for one that maps to this release
      var bestDist = Infinity;
      var bestC, bestR;
      var range = Math.max(N, 20);
      for (var dr = -range; dr <= range; dr++) {
        for (var dc = -range; dc <= range; dc++) {
          var lc = centerLogC + dc;
          var lr = centerLogR + dr;
          if (SRCS[posMod(lc * 5 + lr * 8, N)] === targetSrc) {
            var dist = dc * dc + dr * dr;
            if (dist < bestDist) {
              bestDist = dist;
              bestC = lc;
              bestR = lr;
            }
          }
        }
      }

      if (bestDist === Infinity) return;

      // Calculate scroll position that centers this tile
      var sg = staggerFor(bestR);
      var destX = bestC * STEP_X + sg + offsetX - VW / 2 + SZ / 2;
      var destY = bestR * STEP_Y + offsetY - VH / 2 + SZ / 2;

      // Set scroll target — use slow stiffness for smooth glide
      targetX = destX;
      targetY = destY;
      currentStiffness = STIFFNESS_SLOW;
      pendingOpenRI = ri;

      // Poll until scroll arrives, then auto-open
      if (pendingOpenCheck) cancelAnimationFrame(pendingOpenCheck);
      function checkArrival() {
        if (Math.abs(targetX - scrollX) < 3 && Math.abs(targetY - scrollY) < 3) {
          // Find the centered tile
          var tiles = document.querySelectorAll('.tile');
          var closestTile = null;
          var closestDist = Infinity;
          var cx = VW / 2 + 240;
          var cy = VH / 2;
          tiles.forEach(function(t) {
            var img = t.querySelector('img');
            if (img && img.src.indexOf(targetSrc.replace(/ /g, '%20')) !== -1) {
              var rect = t.getBoundingClientRect();
              var dist = Math.abs(rect.left + rect.width/2 - cx) + Math.abs(rect.top + rect.height/2 - cy);
              if (dist < closestDist) { closestDist = dist; closestTile = t; }
            }
          });
          pendingOpenRI = -1;
          openModal(ri, closestTile);
          return;
        }
        pendingOpenCheck = requestAnimationFrame(checkArrival);
      }
      pendingOpenCheck = requestAnimationFrame(checkArrival);
    }

    // ── Subtle pop sound on hover ──
    var popCtx = null;
    var soundEnabled = localStorage.getItem('dax-sound') !== 'off';
    function playPop() {
      if (!soundEnabled) return;
      if (!popCtx) popCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = popCtx.createOscillator();
      var gain = popCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, popCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, popCtx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.03, popCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, popCtx.currentTime + 0.08);
      osc.connect(gain);
      gain.connect(popCtx.destination);
      osc.start(popCtx.currentTime);
      osc.stop(popCtx.currentTime + 0.08);
    }

    // Sound toggle
    (function() {
      var btn = document.getElementById('soundToggle');
      function updateIcon() { btn.classList.toggle('off', !soundEnabled); }
      updateIcon();
      btn.addEventListener('click', function() {
        soundEnabled = !soundEnabled;
        localStorage.setItem('dax-sound', soundEnabled ? 'on' : 'off');
        updateIcon();
      });
    })();

    // ── Sidebar rendering ──
    function renderSidebar() {
      var list = document.getElementById('sidebar-list');
      list.innerHTML = '';
      RELEASES.forEach(function(rel, ri) {
        var div = document.createElement('div');
        div.className = 'sb-release';
        var searchParts = [rel.artist, rel.title, rel.catalog];
        rel.tracks.forEach(function(t) { searchParts.push(typeof t === 'string' ? t : t.title); });
        div.dataset.search = searchParts.join(' ').toLowerCase();

        var title = document.createElement('div');
        title.className = 'sb-release-title';
        title.textContent = rel.artist + ' — ' + rel.title;
        title.addEventListener('click', function() {
          if (modalOpen) { switchModal(ri); } else { scrollToRelease(ri); }
        });
        title.addEventListener('mouseenter', playPop);
        div.appendChild(title);

        rel.tracks.forEach(function(trk, ti) {
          var row = document.createElement('div');
          row.className = 'sb-track';
          row.dataset.ri = ri;
          row.dataset.ti = ti;

          var icon = document.createElement('span');
          icon.className = 'sb-play-icon';
          icon.textContent = '\u25B6';
          icon.addEventListener('click', function(e) {
            e.stopPropagation();
            if (currentRelease === ri && currentTrack === ti && isPlaying) {
              DaxPlayer.toggle();
            } else {
              DaxPlayer.play(ri, ti);
            }
          });

          var name = document.createElement('span');
          name.textContent = trk.side + '. ' + trk.title;
          name.addEventListener('click', function(e) {
            e.stopPropagation();
            if (currentRelease === ri && currentTrack === ti && isPlaying) {
              DaxPlayer.toggle();
            } else {
              DaxPlayer.play(ri, ti);
            }
          });

          row.addEventListener('mouseenter', playPop);
          row.appendChild(icon);
          row.appendChild(name);
          div.appendChild(row);
        });

        list.appendChild(div);
      });

      // Search filtering
      var sbSearch = document.getElementById('sb-search');
      sbSearch.addEventListener('input', function() {
        var q = this.value.toLowerCase().trim();
        document.querySelectorAll('.sb-release').forEach(function(el) {
          el.style.display = (!q || el.dataset.search.indexOf(q) > -1) ? '' : 'none';
        });
      });
      sbSearch.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sbSearch.blur();
      });
    }

    // ── Layout constants ──
    const SZ     = 338;   // image size (px, square)
    const H_GAP  = 130;   // horizontal gap between images
    const V_GAP  = 120;   // vertical gap between rows
    const STEP_X = SZ + H_GAP;
    const STEP_Y = SZ + V_GAP;

    // Row stagger: alternate rows are offset by half a step
    // row mod 3: 0 → 0, 1 → STEP_X/2, 2 → STEP_X/4
    const STAGGER = [0, STEP_X * 0.5, STEP_X * 0.25];

    // Pool: enough tiles to cover viewport + 1 buffer on each side
    const SIDEBAR_W = (window.innerWidth <= 800) ? 0 : 240;
    const VW = window.innerWidth - SIDEBAR_W;
    const VH = window.innerHeight;

    const POOL_COLS = Math.ceil(VW  / STEP_X) + 3;   // visible + 2 buffer cols
    const POOL_ROWS = Math.ceil(VH  / STEP_Y) + 3;   // visible + 2 buffer rows
    // Make POOL_ROWS a multiple of 3 so row stagger stays consistent after Y-wrap
    const PR = POOL_ROWS + ((3 - (POOL_ROWS % 3)) % 3);

    // We start tiles so the grid is centred, with a –1 buffer on each side
    // offsetX/Y: how far the logical origin has shifted from the viewport origin
    let offsetX = -(SZ + H_GAP) + (VW - (POOL_COLS - 2) * STEP_X) / 2;
    let offsetY = -(SZ + V_GAP) + (VH - (PR        - 2) * STEP_Y) / 2;

    // Correct: start at a scroll offset that centres the grid
    // We track a continuous scroll position:
    let scrollX = 0;
    let scrollY = 0;

    const scene = document.getElementById('scene');
    const tiles  = [];

    // ── Create tile pool ──
    for (let pr = 0; pr < PR; pr++) {
      for (let pc = 0; pc < POOL_COLS; pc++) {
        const el    = document.createElement('div');
        el.className = 'tile';
        el.style.width  = SZ + 'px';
        el.style.height = SZ + 'px';

        const inner = document.createElement('div');
        inner.className = 'tile-inner';

        const img   = document.createElement('img');
        img.alt = '';

        const gloss = document.createElement('div');
        gloss.className = 'tile-gloss';

        inner.appendChild(img);
        inner.appendChild(gloss);
        el.appendChild(inner);
        scene.appendChild(el);

        // Deterministic depth per grid position for consistent sizing across refreshes
        tiles.push({ el, inner, img, gloss, logC: pc - 1, logR: pr - 1, curSrc: '' });

        // Click vs drag detection
        (function(tile) {
          var downX, downY;
          tile.el.addEventListener('mousedown', function(e) {
            downX = e.clientX;
            downY = e.clientY;
          });
          tile.el.addEventListener('mouseup', function(e) {
            var dx = e.clientX - downX;
            var dy = e.clientY - downY;
            if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
              var rel = releaseForSrc(tile.curSrc);
              if (rel) openModal(RELEASES.indexOf(rel), tile.el);
            }
          });
        })(tiles[tiles.length - 1]);
      }
    }

    // ── Helpers ──
    function posMod(n, m) { return ((n % m) + m) % m; }

    // Deterministic depth from grid position — consistent across refreshes
    function depthFor(logC, logR) {
      var h = Math.abs(((logC * 2654435761) ^ (logR * 2246822519)) | 0);
      return 0.75 + (h % 1000) / 1000 * 0.35; // range 0.75–1.1
    }

    function imgFor(logC, logR) {
      // Distribute 21 images: use two coprime-ish multipliers
      return SRCS[posMod(logC * 5 + logR * 8, SRCS.length)];
    }

    function staggerFor(logR) {
      return STAGGER[posMod(logR, 3)];
    }

    // ── Layout update ──
    function layoutTiles() {
      for (const t of tiles) {
        const sg = staggerFor(t.logR);
        let x = t.logC * STEP_X + sg - scrollX + offsetX;
        let y = t.logR * STEP_Y      - scrollY + offsetY;

        // Horizontal wrap
        const periodX = POOL_COLS * STEP_X;
        if (x < -STEP_X * 1.6) {
          t.logC += POOL_COLS;
          x += periodX;
        } else if (x > VW + STEP_X * 0.6) {
          t.logC -= POOL_COLS;
          x -= periodX;
        }

        // Vertical wrap (PR is multiple of 3 so stagger stays consistent)
        const periodY = PR * STEP_Y;
        if (y < -STEP_Y * 1.6) {
          t.logR += PR;
          y += periodY;
        } else if (y > VH + STEP_Y * 0.6) {
          t.logR -= PR;
          y -= periodY;
        }

        // Globe + depth: position-based scale amplified by per-tile depth
        const centerX = VW / 2;
        const centerY = VH / 2;
        const tileCX = x + SZ / 2;
        const tileCY = y + SZ / 2;
        const dx = (tileCX - centerX) / centerX;
        const dy = (tileCY - centerY) / centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Deterministic depth for this grid position
        const depth = depthFor(t.logC, t.logR);
        // Globe curve: how much to shrink based on distance from center
        const globeFalloff = dist * dist * dist * 0.15;
        // "Closer" tiles (high depth) resist the shrink, "far" tiles shrink more
        const finalScale = Math.max(0.65, depth * (1 - globeFalloff * (1.5 - depth)));

        t.el.style.transform = 'translate3d(' + x.toFixed(1) + 'px,' + y.toFixed(1) + 'px,0) scale(' + finalScale.toFixed(4) + ')';

        // Swap image only when it changes (avoids flicker)
        const src = imgFor(t.logC, t.logR);
        if (t.curSrc !== src) {
          t.img.src = src;
          t.curSrc  = src;
        }
      }
    }

    // ── Scroll-driven pan ──
    // targetX/Y track the raw wheel input directly.
    // scrollX/Y chase the target each frame with a stiffness factor —
    // high value = tight/stiff, low = floaty. No separate velocity layer
    // so the OS trackpad momentum is the only inertia (no double-floating).
    let targetX = 0, targetY = 0;
    const STIFFNESS = 0.5;   // fraction of gap closed per frame — 0.3 = stiff, 0.1 = soft
    const STIFFNESS_SLOW = 0.04; // slower scroll for sidebar clicks
    var currentStiffness = STIFFNESS;

    window.addEventListener('wheel', function(e) {
      if (e.target.closest('#sidebar')) return;
      if (e.target.closest('#modal-overlay')) return;
      e.preventDefault();
      targetX += e.deltaX;
      targetY += e.deltaY;
    }, { passive: false });

    // Touch drag support
    var touchStartX = 0, touchStartY = 0, touchLastX = 0, touchLastY = 0;
    scene.addEventListener('touchstart', function(e) {
      if (e.target.closest('#dax-sidebar') || e.target.closest('#dax-player-bar')) return;
      var t = e.touches[0];
      touchStartX = touchLastX = t.clientX;
      touchStartY = touchLastY = t.clientY;
    }, { passive: true });

    scene.addEventListener('touchmove', function(e) {
      if (e.target.closest('#dax-sidebar') || e.target.closest('#dax-player-bar')) return;
      e.preventDefault();
      var t = e.touches[0];
      var dx = touchLastX - t.clientX;
      var dy = touchLastY - t.clientY;
      targetX += dx;
      targetY += dy;
      touchLastX = t.clientX;
      touchLastY = t.clientY;
    }, { passive: false });

    function lerp(a, b, t) { return a + (b - a) * t; }

    var layoutPaused = false;

    function rafLoop() {
      if (!layoutPaused) {
        scrollX += (targetX - scrollX) * currentStiffness;
        scrollY += (targetY - scrollY) * currentStiffness;
        // Restore normal stiffness once close enough
        if (currentStiffness !== STIFFNESS && Math.abs(targetX - scrollX) < 2 && Math.abs(targetY - scrollY) < 2) {
          currentStiffness = STIFFNESS;
        }
        layoutTiles();
      }
      requestAnimationFrame(rafLoop);
    }

    // ── Per-tile 3D hover tilt ──
    tiles.forEach(function(t) {
      let tRX = 0, tRY = 0, cRX = 0, cRY = 0, tTZ = 0, cTZ = 0;
      let hoverRaf = null;

      function tiltTick() {
        cRX = lerp(cRX, tRX, 0.15);
        cRY = lerp(cRY, tRY, 0.15);
        cTZ = lerp(cTZ, tTZ, 0.15);

        t.inner.style.transform =
          'perspective(640px)' +
          ' rotateX(' + cRX.toFixed(3) + 'deg)' +
          ' rotateY(' + cRY.toFixed(3) + 'deg)' +
          ' translateZ(' + cTZ.toFixed(2) + 'px)' +
          ' scale(1.03)';

        const sx = (-cRY / 20) * 24;
        const sy = ( cRX / 20) * 24;
        t.inner.style.boxShadow =
          sx + 'px ' + sy + 'px 36px rgba(0,0,0,0.9),' +
          '0 20px 55px rgba(0,0,0,0.65)';

        const done =
          Math.abs(cRX - tRX) < 0.02 &&
          Math.abs(cRY - tRY) < 0.02 &&
          Math.abs(cTZ - tTZ) < 0.1;
        hoverRaf = done ? null : requestAnimationFrame(tiltTick);
      }

      t.el.addEventListener('mouseenter', function() {
        tTZ = 14;
        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });

      t.el.addEventListener('mousemove', function(e) {
        const r = t.el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;

        tRX = -y * 20;
        tRY =  x * 20;

        // gloss follows cursor
        const gx = (50 + x * 88).toFixed(1);
        const gy = (50 + y * 88).toFixed(1);
        t.gloss.style.background =
          'radial-gradient(circle at ' + gx + '% ' + gy + '%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 45%, transparent 65%)';
        t.gloss.style.opacity = '1';

        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });

      t.el.addEventListener('mouseleave', function() {
        tRX = 0; tRY = 0; tTZ = 0;
        t.gloss.style.opacity = '0';
        t.inner.style.boxShadow = '0 8px 40px rgba(0,0,0,0.55)';
        if (!hoverRaf) hoverRaf = requestAnimationFrame(tiltTick);
      });
    });

    // ── Modal & keyboard controls ──
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-close').addEventListener('mouseenter', playPop);
    document.getElementById('modal-close-x').addEventListener('click', closeModal);
    document.getElementById('modal-close-x').addEventListener('mouseenter', playPop);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOpen) closeModal();
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (currentRelease >= 0) DaxPlayer.toggle();
      }
    });

    // ── Start ──
    renderSidebar();
    layoutTiles();
    requestAnimationFrame(rafLoop);
    document.querySelectorAll('nav a').forEach(function(a) { a.addEventListener('mouseenter', playPop); });

    // ── Theme toggle ──
    var themeToggle = document.getElementById('themeToggle');
    var savedTheme = localStorage.getItem('dax-theme');
    if (savedTheme === 'light') document.documentElement.classList.add('light');

    themeToggle.addEventListener('click', function() {
      document.documentElement.classList.toggle('light');
      var isLight = document.documentElement.classList.contains('light');
      localStorage.setItem('dax-theme', isLight ? 'light' : 'dark');
      playPop();
    });
  </script>
  <script src="player.js"></script>

</body>
</html>
