    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {

      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;

    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2.5rem 8rem;
    }

    /* ── Header ── */
    .site-header {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 0.25rem;
    }

    .page-title {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 2.5rem;
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: #fff;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Year tabs ── */
    .year-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0;
    }

    .year-tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.45rem 0.8rem;
      transition: color 0.1s;
      position: relative;
    }

    .year-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0.8rem; right: 0.8rem;
      height: 1px;
      background: #fff;
      opacity: 0;
    }

    .year-tab:hover { color: rgba(255,255,255,0.6); }
    .year-tab.active { color: #fff; }
    .year-tab.active::after { opacity: 1; }

    /* ── Show list ── */
    .shows-list {
      column-count: 4;
      column-gap: 2.5rem;
    }

    .show-item {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      padding: 0.28rem 0;
      cursor: default;
      break-inside: avoid;
      display: block;
      transition: color 0.08s;
    }

    .show-item:hover {
      color: #3fe1b1;
    }

    @media (max-width: 900px) {
      .shows-list { column-count: 3; }
    }
    @media (max-width: 600px) {
      .page { padding: 2rem 1.25rem 6rem; }
      .shows-list { column-count: 2; }
    }
    @media (max-width: 380px) {
      .shows-list { column-count: 1; }
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 1.6rem;
      padding: 1.2rem 2rem;
      z-index: 300;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8.5px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    nav a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.15s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }
  </style>

    const years = Object.keys(shows).sort((a, b) => b - a);

    function renderTabs() {
      const container = document.getElementById('yearTabs');
      years.forEach((year, i) => {
        const btn = document.createElement('button');
        btn.className = 'year-tab' + (i === 0 ? ' active' : '');
        btn.textContent = year;
        btn.dataset.year = year;
        btn.addEventListener('click', () => selectYear(year));
        container.appendChild(btn);
      });
    }

    function selectYear(year) {
      document.querySelectorAll('.year-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.year === year);
      });
      renderShows(year);
    }

    // ── Scramble effect ──
    const GLYPHS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@!$%&*<>/\\|[]^~_+=?';

    function scrambleIn(el, original, duration) {
      if (el._raf) cancelAnimationFrame(el._raf);
      const start = performance.now();
      const len = original.length;
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const resolved = Math.floor(p * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (original[i] === ' ') { out += ' '; continue; }
          out += i < resolved
            ? original[i]
            : GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        }
        el.textContent = out;
        el._raf = p < 1 ? requestAnimationFrame(tick) : null;
        if (p >= 1) el.textContent = original;
      }
      el._raf = requestAnimationFrame(tick);
    }

    function scrambleOut(el, original, duration) {
      if (el._raf) cancelAnimationFrame(el._raf);
      const start = performance.now();
      const len = original.length;
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const scrambled = Math.floor((1 - p) * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (original[i] === ' ') { out += ' '; continue; }
          out += i >= scrambled
            ? original[i]
            : GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        }
        el.textContent = out;
        el._raf = p < 1 ? requestAnimationFrame(tick) : null;
        if (p >= 1) el.textContent = original;
      }
      el._raf = requestAnimationFrame(tick);
    }

    function renderShows(year) {
      const container = document.getElementById('showsGrid');
      const list = shows[year] || [];

      container.innerHTML = list.map(show => {
        return '<div class="show-item">' + show + '</div>';
      }).join('');

      container.querySelectorAll('.show-item').forEach(el => {
        const original = el.textContent;

        el.addEventListener('mouseenter', function() {
          scrambleIn(el, original, 500);
          el.style.color = '#3fe1b1';
        });

        el.addEventListener('mouseleave', function() {
          scrambleOut(el, original, 350);
          el.style.color = '';
        });
      });
    }

    renderTabs();
    renderShows(years[0]);
  </script>
</body>
</html>
