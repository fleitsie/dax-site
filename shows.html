  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15.1px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-y: scroll;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2.5rem 8rem;
    }

    /* ── Header ── */
    .site-header {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 0.25rem;
      margin-left: -10%;
    }

    .page-title {
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 2.5rem;
      margin-left: -10%;
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: #fff;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Year tabs ── */
    .year-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 0.55rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0;
      margin-left: -10%;
      margin-right: -10%;
    }

    .year-tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.45rem 0.4rem;
      transition: color 0.1s;
      position: relative;
    }

    .year-tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0.8rem; right: 0.8rem;
      height: 1px;
      background: #fff;
      opacity: 0;
    }

    .year-tab:hover { color: #39ff14; }
    .year-tab.active { color: #39ff14; }
    .year-tab.active::after { opacity: 1; }

    /* ── Show list ── */
    .shows-list {
      column-count: 4;
      column-gap: 3.5rem;
      margin-left: -10%;
      margin-right: -10%;
    }

    .show-item {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      padding: 0.38rem 0.4rem;
      margin: 0 -0.4rem;
      cursor: default;
      break-inside: avoid;
      display: block;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }

    /* Style 1: Cyan scan bar */
    .show-item::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 0; height: 100%;
      background: #39ff14;
      z-index: -1;
      transition: width 0.3s ease-out;
    }
    .shows-list[data-style="1"] .show-item:hover { color: #000; }
    .shows-list[data-style="1"] .show-item:hover::after { width: 100%; }
    .shows-list[data-style="1"] .show-item:not(:hover)::after { width: 0; }

    /* Style 5: Redact bar */
    .show-item .redact-bar {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: #fff;
      z-index: 1;
      pointer-events: none;
      width: 0;
    }

    /* Style 4: corridor char spans */
    .show-item .char {
      display: inline-block;
    }

    /* Style 6: Split-flap departure board */
    .shows-list[data-style="6"] .show-item {
      overflow: visible;
      padding: 0.45rem 0.4rem;
      line-height: 1;
    }
    .shows-list[data-style="6"] .flap-cell {
      display: inline-block;
      position: relative;
      width: 0.65em;
      height: 1.3em;
      text-align: center;
      background: #181818;
      border-radius: 2px;
      margin: 0 0.5px;
      vertical-align: middle;
      overflow: hidden;
      font-size: 0.82rem;
      color: #e8e8e8;
    }
    .shows-list[data-style="6"] .flap-cell.space {
      background: none;
      width: 0.4em;
    }
    .shows-list[data-style="6"] .flap-cell .ftop {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: #1c1c1c;
      border-bottom: 1px solid #000;
    }
    .shows-list[data-style="6"] .flap-cell .fbot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      background: #181818;
    }
    .shows-list[data-style="6"] .flap-cell .ftop span,
    .shows-list[data-style="6"] .flap-cell .fbot span {
      position: absolute;
      left: 0; right: 0;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shows-list[data-style="6"] .flap-cell .ftop span { top: 0; }
    .shows-list[data-style="6"] .flap-cell .fbot span { bottom: 0; }
    .shows-list[data-style="6"] .flap-cell .fflip {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      overflow: hidden;
      backface-visibility: hidden;
      z-index: 2;
    }
    .shows-list[data-style="6"] .flap-cell .fflip.fflip-top {
      top: 0;
      background: #1c1c1c;
      border-bottom: 1px solid #000;
      transform-origin: bottom center;
    }
    .shows-list[data-style="6"] .flap-cell .fflip.fflip-bot {
      top: 50%;
      background: #181818;
      transform-origin: top center;
    }
    .shows-list[data-style="6"] .flap-cell .fflip span {
      position: absolute;
      left: 0; right: 0;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shows-list[data-style="6"] .flap-cell .fflip.fflip-top span { top: 0; }
    .shows-list[data-style="6"] .flap-cell .fflip.fflip-bot span { bottom: 0; }

    @media (max-width: 1100px) {
      .shows-list { column-count: 3; }
    }
    @media (max-width: 600px) {
      .page { padding: 2rem 1.25rem 6rem; }
      .shows-list { column-count: 2; }
    }
    @media (max-width: 380px) {

        "31/12 Brussels, FCKNYE",
        "31/12 Nijmegen, Doornroosje",
      ],
      "2015": [
        "30/01 Berlin, Griessmuehle",
        "13/02 Vilnius, Hooked On",
        "24/04 Lyon, DV1 Club",
        "16/05 Wroclaw, Das Lokal",
        "19/06 Lille, Ozzy Fest 2015",
        "20/06 Pula, Slurp! Festival",
        "11/07 Berlin, Berghain",
        "24/07 Gothenburg, Über Open Air",
        "25/07 Trani, White XXX",
        "01/08 Belgrade, Svermirska Kafana",
        "22/08 Rotterdam, Tegenstroom Afterparty",
        "22/08 Rotterdam, Tegenstroom Festival",
        "05/09 Nantes, Altercafe",
        "12/09 Taipei, Innervve",
        "18/09 Nuremburg, Haus 33",
        "19/09 Taranto, Sound Department",
        "24/10 Paris, Drom",
        "07/11 Berlin, Berghain",
        "10/11 Gent, Decadance",
        "21/11 Utrecht, Poema",
        "05/12 Napoli, Duel Beat",
        "11/12 Toulouse, La Dynamo",
        "12/12 Copenhagen, KB18",
        "17/12 Lyon, DV1",
        "18/12 Brussels, Fuse",
        "19/12 Verona, Alterego",
        "28/03 Avellino, Komponent",
        "09/05 London, Crucifix Lane",
        "07/06 Aachen, Transition - Musikbunker",
        "08/06 London, Cafe 1001",
        "17/10 Paisley, The Club",
        "21/11 Marseille, Le Baby",
        "22/11 Paris, Batofar",
        "13/12 Saarbrucken, Ubar",
        "31/12 Zagreb, Sirup Club",
        "31/12 Pula, Seasplash platforma # 8",
      ],
    };

    const years = Object.keys(shows).sort((a, b) => b - a);

    function renderTabs() {
      const container = document.getElementById('yearTabs');
      years.forEach((year, i) => {
        const btn = document.createElement('button');
        btn.className = 'year-tab' + (i === 0 ? ' active' : '');
        btn.textContent = year;
        btn.dataset.year = year;
        btn.addEventListener('click', () => selectYear(year));
        container.appendChild(btn);
      });
    }

    function selectYear(year) {
      document.querySelectorAll('.year-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.year === year);
      });
      renderShows(year);
    }

    // ── Shared ──
    const GLYPHS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@!$%&*<>/\\|[]^~_+=?';
    function rg() { return GLYPHS[Math.floor(Math.random() * GLYPHS.length)]; }

    function scrambleIn(el, original, duration) {
      if (el._raf) cancelAnimationFrame(el._raf);
      const start = performance.now();
      const len = original.length;
      (function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const resolved = Math.floor(p * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (original[i] === ' ') { out += ' '; continue; }
          out += i < resolved ? original[i] : rg();
        }
        el.textContent = out;
        el._raf = p < 1 ? requestAnimationFrame(tick) : null;
        if (p >= 1) el.textContent = original;
      })(performance.now());
    }

    function scrambleOut(el, original, duration) {
      if (el._raf) cancelAnimationFrame(el._raf);
      const start = performance.now();
      const len = original.length;
      (function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const scrambled = Math.floor((1 - p) * len);
        let out = '';
        for (let i = 0; i < len; i++) {
          if (original[i] === ' ') { out += ' '; continue; }
          out += i >= scrambled ? original[i] : rg();
        }
        el.textContent = out;
        el._raf = p < 1 ? requestAnimationFrame(tick) : null;
        if (p >= 1) el.textContent = original;
      })(performance.now());
    }

    // Year -> style mapping
    const STYLE_MAP = { '2026': '1', '2025': '2', '2024': '3', '2023': '4', '2022': '5', '2021': '6' };

    // ── 1: Cyan scan bar + scramble ──
    function attachStyle1(el, original) {
      el.addEventListener('mouseenter', () => scrambleIn(el, original, 400));
      el.addEventListener('mouseleave', () => scrambleOut(el, original, 300));
    }

    // ── 2: Strobe flicker + scramble ──
    function attachStyle2(el, original) {
      el.addEventListener('mouseenter', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        if (el._flicker) clearInterval(el._flicker);
        const start = performance.now();
        const len = original.length;
        let flickerState = false;
        el._flicker = setInterval(() => {
          flickerState = !flickerState;
          el.style.color = flickerState ? '#000' : '#fff';
          el.style.background = flickerState ? '#fff' : 'transparent';
        }, 50);
        (function tick(now) {
          const p = Math.min((now - start) / 500, 1);
          const resolved = Math.floor(p * len);
          let out = '';
          for (let i = 0; i < len; i++) {
            if (original[i] === ' ') { out += ' '; continue; }
            out += i < resolved ? original[i] : rg();
          }
          el.textContent = out;
          if (p < 1) {
            el._raf = requestAnimationFrame(tick);
          } else {
            el.textContent = original;
            clearInterval(el._flicker); el._flicker = null;
            el.style.color = ''; el.style.background = '';
            el._raf = null;
          }
        })(performance.now());
      });
      el.addEventListener('mouseleave', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        if (el._flicker) { clearInterval(el._flicker); el._flicker = null; }
        el.style.color = ''; el.style.background = '';
        el.textContent = original;
      });
    }

    // ── 3: Glitch split (RGB offset) ──
    function attachStyle3(el, original) {
      el.addEventListener('mouseenter', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        const start = performance.now();
        const len = original.length;
        (function tick(now) {
          const p = Math.min((now - start) / 500, 1);
          const resolved = Math.floor(p * len);
          const intensity = 1 - p;
          const ox = Math.round(Math.sin(now * 0.03) * 2 * intensity);
          const oy = Math.round(Math.cos(now * 0.02) * 1 * intensity);
          el.style.textShadow = intensity > 0.05
            ? ox+'px '+oy+'px 0 rgba(255,0,50,'+0.7*intensity+'), '+-ox+'px '+-oy+'px 0 rgba(0,200,255,'+0.7*intensity+')'
            : 'none';
          let out = '';
          for (let i = 0; i < len; i++) {
            if (original[i] === ' ') { out += ' '; continue; }
            out += i < resolved ? original[i] : rg();
          }
          el.textContent = out;
          if (p < 1) { el._raf = requestAnimationFrame(tick); }
          else { el.textContent = original; el.style.textShadow = 'none'; el._raf = null; }
        })(performance.now());
      });
      el.addEventListener('mouseleave', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        el.style.textShadow = 'none';
        el.textContent = original;
      });
    }

    // ── 4: Corridor collapse ──
    function attachStyle4(el, original) {
      el.addEventListener('mouseenter', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        const start = performance.now();
        const len = original.length;
        el.innerHTML = '';
        const spans = [];
        for (let i = 0; i < len; i++) {
          const s = document.createElement('span');
          s.className = 'char';
          s.textContent = original[i];
          el.appendChild(s);
          spans.push(s);
        }
        (function tick(now) {
          const p = Math.min((now - start) / 500, 1);
          const squeeze = p < 0.5 ? p * 2 : 2 - p * 2;
          const mid = len / 2;
          for (let i = 0; i < len; i++) {
            const distFromMid = (i - mid) / mid;
            spans[i].style.transform = 'translateX(' + (distFromMid * -squeeze * 8) + 'px)';
            spans[i].style.opacity = squeeze > 0.7 ? 0.3 : 1;
            if (squeeze > 0.4 && original[i] !== ' ') { spans[i].textContent = rg(); }
            else { spans[i].textContent = original[i]; }
          }
          if (p < 1) { el._raf = requestAnimationFrame(tick); }
          else { el.textContent = original; el._raf = null; }
        })(performance.now());
      });
      el.addEventListener('mouseleave', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        el.textContent = original;
      });
    }

    // ── 5: Redact / declassify ──
    function attachStyle5(el, original) {
      let bar = document.createElement('div');
      bar.className = 'redact-bar';
      el.appendChild(bar);

      el.addEventListener('mouseenter', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        const start = performance.now();
        const len = original.length;
        (function tick(now) {
          const p = Math.min((now - start) / 600, 1);
          const lead = Math.min(p * 1.8, 1);
          const trail = Math.max((p - 0.3) / 0.7, 0);
          bar.style.left = (trail * 100) + '%';
          bar.style.width = ((lead - trail) * 100) + '%';
          const resolved = Math.floor(trail * len);
          let out = '';
          for (let i = 0; i < len; i++) {
            if (original[i] === ' ') { out += ' '; continue; }
            out += i < resolved ? original[i] : rg();
          }
          el.childNodes[0].textContent = out;
          if (p < 1) { el._raf = requestAnimationFrame(tick); }
          else { el.childNodes[0].textContent = original; bar.style.width = '0'; el._raf = null; }
        })(performance.now());
      });
      el.addEventListener('mouseleave', () => {
        if (el._raf) cancelAnimationFrame(el._raf);
        bar.style.width = '0';
        if (el.childNodes[0] && el.childNodes[0].nodeType === 3) {
          el.childNodes[0].textContent = original;
        } else {
          const txt = original;
          el.textContent = txt;
          el.appendChild(bar);
        }
      });
    }

    // ── 6: Split-flap departure board ──
    const FLAP_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/,.:- ';

    function makeFlapCell(ch) {
      const isSpace = ch === ' ';
      const cell = document.createElement('span');
      cell.className = 'flap-cell' + (isSpace ? ' space' : '');
      if (!isSpace) {
        const top = document.createElement('div');
        top.className = 'ftop';
        const ts = document.createElement('span');
        ts.textContent = ch;
        top.appendChild(ts);
        const bot = document.createElement('div');
        bot.className = 'fbot';
        const bs = document.createElement('span');
        bs.textContent = ch;
        bot.appendChild(bs);
        cell.appendChild(top);
        cell.appendChild(bot);
      }
      return cell;
    }

    function flipFlapCell(cell, fromChar, toChar, onDone) {
      const flipTop = document.createElement('div');
      flipTop.className = 'fflip fflip-top';
      const fts = document.createElement('span');
      fts.textContent = fromChar;
      flipTop.appendChild(fts);
      cell.appendChild(flipTop);
      cell.querySelector('.fbot span').textContent = toChar;
      let angle = 0;
      function tickDown() {
        angle += 18;
        if (angle >= 90) {
          flipTop.remove();
          cell.querySelector('.ftop span').textContent = toChar;
          const flipBot = document.createElement('div');
          flipBot.className = 'fflip fflip-bot';
          const fbs = document.createElement('span');
          fbs.textContent = toChar;
          flipBot.appendChild(fbs);
          cell.appendChild(flipBot);
          let a2 = -90;
          function tickUp() {
            a2 += 18;
            if (a2 >= 0) { flipBot.remove(); if (onDone) onDone(); return; }
            flipBot.style.transform = 'rotateX(' + (-a2) + 'deg)';
            requestAnimationFrame(tickUp);
          }
          flipBot.style.transform = 'rotateX(90deg)';
          requestAnimationFrame(tickUp);
          return;
        }
        flipTop.style.transform = 'rotateX(' + angle + 'deg)';
        requestAnimationFrame(tickDown);
      }
      requestAnimationFrame(tickDown);
    }

    function attachStyle6(el, original) {
      const upper = original.toUpperCase();
      el.innerHTML = '';
      const cells = [];
      for (let i = 0; i < upper.length; i++) {
        const cell = makeFlapCell(upper[i]);
        el.appendChild(cell);
        cells.push({ el: cell, char: upper[i], isSpace: upper[i] === ' ' });
      }
      let running = false;
      el.addEventListener('mouseenter', () => {
        if (running) return;
        running = true;
        let done = 0;
        cells.forEach((c, i) => {
          if (c.isSpace) { done++; return; }
          const numFlips = 4 + Math.floor(Math.random() * 6);
          let step = 0;
          let current = c.char;
          setTimeout(() => {
            function doFlip() {
              step++;
              const isLast = step > numFlips;
              const next = isLast ? c.char : FLAP_CHARS[Math.floor(Math.random() * (FLAP_CHARS.length - 1))];
              flipFlapCell(c.el, current, next, () => {
                current = next;
                if (!isLast) { doFlip(); }
                else { done++; if (done >= cells.length) running = false; }
              });
            }
            doFlip();
          }, i * 30);
        });
      });
    }

    function renderShows(year) {
      const container = document.getElementById('showsGrid');
      const list = shows[year] || [];
      const style = STYLE_MAP[year] || null;

      container.setAttribute('data-style', style || '');

      container.innerHTML = list.map(show => {
        return '<div class="show-item">' + show + '</div>';
      }).join('');

      container.querySelectorAll('.show-item').forEach(el => {
        const original = el.textContent;
        if (style === '1') attachStyle1(el, original);
        else if (style === '2') attachStyle2(el, original);
        else if (style === '3') attachStyle3(el, original);
        else if (style === '4') attachStyle4(el, original);
        else if (style === '5') attachStyle5(el, original);
        else if (style === '6') attachStyle6(el, original);
        // No effect for years without a style
      });
    }

    // ── Pop sound ──
    var popCtx = null;
    function playPop() {
      if (!popCtx) popCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = popCtx.createOscillator();
      var gain = popCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, popCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, popCtx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.03, popCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, popCtx.currentTime + 0.08);
      osc.connect(gain);
      gain.connect(popCtx.destination);
      osc.start(popCtx.currentTime);
      osc.stop(popCtx.currentTime + 0.08);
    }

    renderTabs();
    renderShows(years[0]);

    // Attach pop to nav, year tabs, show items
    document.querySelectorAll('nav a, .year-tab').forEach(function(el) { el.addEventListener('mouseenter', playPop); });
    // Re-attach to show items after each render
    var origRenderShows = renderShows;
    renderShows = function(year) {
      origRenderShows(year);
      document.querySelectorAll('.show-item').forEach(function(el) { el.addEventListener('mouseenter', playPop); });
    };
    // Trigger once for initial render
    document.querySelectorAll('.show-item').forEach(function(el) { el.addEventListener('mouseenter', playPop); });
  </script>
